<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Blast — Chơi & Học Tiếng Anh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#EAF6F1; --bg2:#DDF0F7;
    --ink:#25404A; --ink-soft:#5E7A82;
    --panel:#FFFFFF; --panel-line:#D5E7E2;
    --cell-empty:#E4EFEB; --cell-line:#F3F9F7;
    --teal:#12857A; --teal-d:#0E6A61;
    --coral:#FF6B6B; --sun:#FFC53D; --grass:#5FC97B;
    --sky:#4D96FF; --grape:#9B72CF; --tang:#FF9445;
    --gold:#F0A500;
    --shadow:0 6px 0 rgba(0,0,0,.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, var(--bg2) 0%, var(--bg1) 60%);
    display:flex; flex-direction:column; align-items:center;
    min-height:100dvh; overflow-x:hidden;
    user-select:none; -webkit-user-select:none;
  }
  .wrap{width:100%; max-width:560px; padding:10px 14px 24px; display:flex; flex-direction:column; gap:12px;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .logo{font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(20px,6vw,26px); color:var(--teal-d); letter-spacing:.5px; line-height:1;}
  .logo b{color:var(--coral);}
  .stats{display:flex; gap:8px;}
  .stat{background:var(--panel); border:2px solid var(--panel-line); border-radius:14px; padding:5px 11px; text-align:center; min-width:60px;}
  .stat .k{font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft);}
  .stat .v{font-family:'Baloo 2',cursive; font-weight:800; font-size:19px; line-height:1; color:var(--ink);}
  .iconbtn{background:var(--panel); border:2px solid var(--panel-line); border-radius:14px; width:42px; height:42px; font-size:20px; cursor:pointer; display:grid; place-items:center;}
  .iconbtn:active{transform:translateY(2px);}

  /* ---------- Word panel ---------- */
  .word{
    background:var(--panel); border:2px solid var(--panel-line); border-radius:22px;
    padding:12px 14px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow);
  }
  .word .emoji{font-size:clamp(38px,11vw,52px); line-height:1; filter:drop-shadow(0 3px 2px rgba(0,0,0,.12));}
  .word .mid{flex:1; min-width:0;}
  .theme{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--tang); margin-bottom:4px;}
  .slots{display:flex; flex-wrap:wrap; gap:6px;}
  .slot{
    width:clamp(28px,7.8vw,38px); height:clamp(36px,9.8vw,48px);
    border-radius:11px; background:var(--cell-line); border:2px dashed #BFD6D0;
    display:grid; place-items:center;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(19px,5.6vw,26px); color:var(--teal-d);
  }
  .slot.filled{background:#FFF4D6; border:2px solid var(--gold); animation:pop .32s ease; cursor:pointer;}
  .slot.filled:active{transform:scale(.9);}
  .meaning{margin-top:5px; font-weight:700; font-size:13px; color:var(--ink-soft); min-height:17px;}
  .meaning.show{color:var(--teal-d);}
  .speak{
    background:var(--teal); color:#fff; border:none; border-radius:14px;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:14px; padding:9px 12px;
    cursor:pointer; box-shadow:0 4px 0 var(--teal-d); white-space:nowrap;
  }
  .speak:active{transform:translateY(3px); box-shadow:0 1px 0 var(--teal-d);}

  /* ---------- Board ---------- */
  .board-wrap{display:flex; justify-content:center;}
  .board-outer{width:min(92vw, 460px); position:relative;}
  .board-outer::before{content:""; display:block; padding-top:100%;}
  #board{
    position:absolute; inset:0;
    display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    gap:5px; padding:9px; background:var(--panel); border:2px solid var(--panel-line);
    border-radius:22px; box-shadow:var(--shadow); touch-action:none;
  }
  .cell{border-radius:8px; background:var(--cell-empty); transition:background .08s;}
  .cell.fill{box-shadow:inset 0 -4px 0 rgba(0,0,0,.14), inset 0 2px 0 rgba(255,255,255,.35);}
  .cell.ghost-ok{background:rgba(95,201,123,.45); outline:2px dashed var(--grass); outline-offset:-2px;}
  .cell.ghost-bad{background:rgba(255,107,107,.30); outline:2px dashed var(--coral); outline-offset:-2px;}
  .cell.clearing{animation:blast .48s ease forwards;}
  @keyframes blast{0%{transform:scale(1)}30%{transform:scale(1.22) rotate(4deg); filter:brightness(1.7)}70%{transform:scale(1.05) rotate(10deg); filter:brightness(1.4)}100%{transform:scale(0) rotate(20deg); opacity:0}}
  @keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}

  /* ---------- Particle burst ---------- */
  .particle{position:fixed; left:0; top:0; border-radius:50%; pointer-events:none; z-index:80; will-change:transform,opacity;}
  @keyframes fly{
    0%{transform:translate(var(--x0),var(--y0)) scale(1); opacity:1;}
    100%{transform:translate(var(--x1),var(--y1)) scale(.2); opacity:0;}
  }
  .particle.spark{animation:fly var(--dur,.55s) cubic-bezier(.2,.7,.3,1) forwards;}

  /* combo flying label */
  .combo-pop{position:fixed; z-index:91; pointer-events:none; font-family:'Baloo 2',cursive; font-weight:800;
    color:var(--gold); text-shadow:0 2px 0 rgba(0,0,0,.18); white-space:nowrap;
    animation:comboUp .8s ease forwards;}
  @keyframes comboUp{0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}20%{opacity:1; transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0; transform:translate(-50%,-140%) scale(1)}}

  /* board shake on big combo */
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,2px)}40%{transform:translate(5px,-3px)}60%{transform:translate(-4px,3px)}80%{transform:translate(3px,-2px)}}
  #board.shake{animation:shake .35s ease;}
  @keyframes megashake{0%,100%{transform:translate(0,0) rotate(0)}15%{transform:translate(-10px,4px) rotate(-1deg)}30%{transform:translate(9px,-6px) rotate(1deg)}45%{transform:translate(-8px,6px) rotate(-1.5deg)}60%{transform:translate(7px,-4px) rotate(1deg)}75%{transform:translate(-6px,4px) rotate(-.5deg)}90%{transform:translate(4px,-2px) rotate(.5deg)}}
  #board.mega-shake{animation:megashake .6s ease;}

  /* ---------- Mega lightning strike (Candy Crush style) ---------- */
  .mega-flash{position:fixed; inset:0; background:#fff; opacity:0; z-index:97; pointer-events:none; animation:megaFlash 1.8s ease-out forwards;}
  @keyframes megaFlash{0%{opacity:0}8%{opacity:.85}20%{opacity:.2}32%{opacity:.65}46%{opacity:.12}60%{opacity:.35}78%{opacity:.08}100%{opacity:0}}
  .mega-overlay{position:fixed; inset:0; z-index:98; pointer-events:none; overflow:hidden;}
  .bolt{position:absolute; top:0; filter:drop-shadow(0 0 6px #fff) drop-shadow(0 0 18px var(--sky)); animation:boltFlicker 1.6s steps(2,end) forwards;}
  @keyframes boltFlicker{0%{opacity:0}10%{opacity:1}24%{opacity:.3}36%{opacity:1}52%{opacity:.2}66%{opacity:1}82%{opacity:.35}92%{opacity:.8}100%{opacity:0}}
  .mega-pop{position:fixed; left:50%; top:30%; transform:translate(-50%,-50%) scale(.5); z-index:99; pointer-events:none;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:clamp(30px,9vw,52px); text-align:center;
    color:#FFF6CE; -webkit-text-stroke:2px #E8890C;
    text-shadow:0 0 14px #FFD35C, 0 0 30px #FF9445, 0 4px 0 rgba(0,0,0,.25);
    animation:megaPop 2.4s cubic-bezier(.2,.9,.3,1) forwards;}
  @keyframes megaPop{0%{opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(-8deg)}10%{opacity:1; transform:translate(-50%,-50%) scale(1.25) rotate(4deg)}20%{transform:translate(-50%,-50%) scale(1) rotate(-2deg)}85%{opacity:1; transform:translate(-50%,-55%) scale(1) rotate(0deg)}100%{opacity:0; transform:translate(-50%,-75%) scale(.9) rotate(0deg)}}

  /* ---------- Word action stage ---------- */
  .word-action-overlay{position:fixed; inset:0; pointer-events:none; z-index:95; overflow:hidden;}
  .wa-emoji{position:absolute; font-size:min(20vw,86px); line-height:1; filter:drop-shadow(0 8px 8px rgba(0,0,0,.25));}
  .wa-run{animation: waRun 1.7s cubic-bezier(.4,.05,.3,1) forwards;}
  @keyframes waRun{
    0%{left:-18%; bottom:6%; transform:scaleX(-1) translateY(0);}
    12%{transform:scaleX(-1) translateY(-14px);} 24%{transform:scaleX(-1) translateY(0);}
    36%{transform:scaleX(-1) translateY(-14px);} 48%{transform:scaleX(-1) translateY(0);}
    60%{transform:scaleX(-1) translateY(-14px);} 72%{transform:scaleX(-1) translateY(0);}
    100%{left:112%; bottom:6%; transform:scaleX(-1) translateY(0);}
  }
  .wa-fly{animation: waFly 2s ease-in-out forwards;}
  @keyframes waFly{
    0%{left:-18%; top:22%; transform:translateY(0) rotate(-4deg);}
    30%{top:12%; transform:translateY(-6px) rotate(3deg);}
    60%{top:18%; transform:translateY(4px) rotate(-3deg);}
    100%{left:112%; top:14%; transform:translateY(0) rotate(2deg);}
  }
  .wa-swim{animation: waSwim 2s ease-in-out forwards;}
  @keyframes waSwim{
    0%{left:-18%; top:46%; transform:scaleX(-1) rotate(0deg);}
    25%{top:40%; transform:scaleX(-1) rotate(-6deg);}
    50%{top:52%; transform:scaleX(-1) rotate(6deg);}
    75%{top:40%; transform:scaleX(-1) rotate(-6deg);}
    100%{left:112%; top:46%; transform:scaleX(-1) rotate(0deg);}
  }
  .wa-bounce{animation: waBounce 1.9s ease-in-out forwards;}
  @keyframes waBounce{
    0%{left:-18%; bottom:6%;}
    12%{bottom:38%;} 24%{bottom:6%;} 36%{bottom:34%;} 48%{bottom:6%;}
    60%{bottom:30%;} 72%{bottom:6%;} 84%{bottom:22%;}
    100%{left:112%; bottom:6%;}
  }
  .wa-rain{animation: waRainDrop 1.4s ease-in forwards; font-size:min(14vw,58px);}
  @keyframes waRainDrop{
    0%{top:-15%; opacity:0; transform:rotate(0deg);}
    12%{opacity:1;}
    100%{top:108%; opacity:.85; transform:rotate(12deg);}
  }
  .wa-spin{animation: waSpin 1.7s ease forwards;}
  @keyframes waSpin{
    0%{left:50%; top:46%; transform:translate(-50%,-50%) scale(0) rotate(-35deg); opacity:0;}
    28%{transform:translate(-50%,-50%) scale(1.35) rotate(12deg); opacity:1;}
    45%{transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1;}
    78%{transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(.65) rotate(14deg); opacity:0;}
  }

  /* ---------- Tray ---------- */
  #tray{display:flex; justify-content:space-around; align-items:center; gap:8px; min-height:96px;
    background:var(--panel); border:2px solid var(--panel-line); border-radius:22px; padding:10px; box-shadow:var(--shadow);}
  .piece{display:grid; gap:3px; cursor:grab; touch-action:none; padding:4px;}
  .piece.used{visibility:hidden;}
  .piece.dragging{opacity:.25;}
  .pcell{width:var(--pc,17px); height:var(--pc,17px); border-radius:5px;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.14), inset 0 2px 0 rgba(255,255,255,.35);}
  .pcell.empty{background:transparent; box-shadow:none;}

  .hint{text-align:center; font-weight:700; color:var(--ink-soft); font-size:13px; margin-top:-2px;}

  /* floating drag piece */
  #floater{position:fixed; left:0; top:0; pointer-events:none; z-index:50; display:grid; gap:4px; transform:translate(-9999px,-9999px);}
  #floater .pcell{width:var(--fc,34px); height:var(--fc,34px); opacity:.92;}

  /* ---------- Overlays ---------- */
  .overlay{position:fixed; inset:0; background:rgba(20,50,50,.55); display:none; place-items:center; z-index:100; padding:24px;}
  .overlay.show{display:grid;}
  .card{background:var(--panel); border-radius:26px; padding:26px 24px; text-align:center; max-width:360px; width:100%; box-shadow:0 12px 40px rgba(0,0,0,.3);}
  .card .big{font-size:60px; line-height:1;}
  .card h2{font-family:'Baloo 2',cursive; margin:8px 0 2px; font-size:26px; color:var(--teal-d);}
  .card p{margin:2px 0; color:var(--ink-soft); font-weight:700;}
  .card .score-line{font-family:'Baloo 2',cursive; font-size:22px; color:var(--ink); margin:10px 0;}
  .btn{margin-top:12px; background:var(--coral); color:#fff; border:none; border-radius:16px;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:19px; padding:13px 26px; cursor:pointer; box-shadow:0 5px 0 #E04F4F;}
  .btn:active{transform:translateY(4px); box-shadow:0 1px 0 #E04F4F;}
  .btn.ghost{background:var(--panel); color:var(--teal-d); border:2px solid var(--panel-line); box-shadow:0 5px 0 var(--panel-line);}
  .btn.ghost:active{box-shadow:0 1px 0 var(--panel-line);}

  /* level buttons */
  .levels{display:flex; flex-direction:column; gap:12px; margin-top:16px;}
  .lvl{border:none; border-radius:18px; padding:15px; cursor:pointer; text-align:left; display:flex; align-items:center; gap:14px; color:#fff; box-shadow:0 5px 0 rgba(0,0,0,.15);}
  .lvl:active{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .lvl .lemoji{font-size:34px;}
  .lvl .lname{font-family:'Baloo 2',cursive; font-weight:800; font-size:21px; line-height:1;}
  .lvl .ldesc{font-size:12.5px; font-weight:700; opacity:.92;}
  .lvl.easy{background:var(--grass);}  .lvl.med{background:var(--sky);}  .lvl.hard{background:var(--grape);}

  /* ---------- Card collection ---------- */
  .overlay.scrolly{align-items:start; overflow-y:auto; padding:18px 12px 40px;}
  .coll-card{background:var(--panel); border-radius:26px; padding:20px 16px; max-width:520px; width:100%; margin:0 auto; box-shadow:0 12px 40px rgba(0,0,0,.3);}
  .coll-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .coll-head h2{font-family:'Baloo 2',cursive; font-size:24px; color:var(--teal-d); margin:0;}
  .coll-total{font-weight:800; color:var(--ink-soft); font-size:14px;}
  .closebtn{background:var(--cell-empty); border:none; border-radius:12px; width:38px; height:38px; font-size:18px; cursor:pointer; font-weight:800; color:var(--ink);}
  .theme-sec{margin-top:14px;}
  .theme-title{display:flex; align-items:center; justify-content:space-between; font-family:'Baloo 2',cursive; font-weight:800; font-size:16px; color:var(--ink); margin-bottom:4px;}
  .theme-bar{height:8px; background:var(--cell-empty); border-radius:99px; overflow:hidden; margin-bottom:10px;}
  .theme-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--grass),var(--teal)); border-radius:99px; transition:width .4s ease;}
  .cards-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:8px;}
  .vcard{background:linear-gradient(180deg,#FFFDF4,#FFF4D6); border:2px solid var(--gold); border-radius:14px; padding:8px 4px 6px; text-align:center; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.08);}
  .vcard:active{transform:translateY(2px);}
  .vcard .ve{font-size:30px; line-height:1.15;}
  .vcard .vw{font-family:'Baloo 2',cursive; font-weight:800; font-size:13px; color:var(--teal-d); letter-spacing:.5px;}
  .vcard .vv{font-size:10.5px; font-weight:700; color:var(--ink-soft); line-height:1.15;}
  .vcard .vc{font-size:9.5px; font-weight:800; color:var(--tang); margin-top:2px;}
  .vcard.locked{background:var(--cell-empty); border:2px dashed #C4D8D2; cursor:default; box-shadow:none;}
  .vcard.locked .ve{filter:grayscale(1); opacity:.35;}
  .vcard.locked .vw{color:#A9C0BA;}
  /* new card banner */
  .newcard-pop{position:fixed; left:50%; top:26%; transform:translate(-50%,-50%); z-index:96; pointer-events:none;
    background:linear-gradient(180deg,#FFFDF4,#FFF1C4); border:3px solid var(--gold); border-radius:20px;
    padding:14px 20px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.25);
    animation:newcardIn 2s cubic-bezier(.2,.9,.3,1) forwards;}
  .newcard-pop .ne{font-size:52px; line-height:1;}
  .newcard-pop .nt{font-family:'Baloo 2',cursive; font-weight:800; font-size:15px; color:var(--tang); letter-spacing:1px;}
  .newcard-pop .nw{font-family:'Baloo 2',cursive; font-weight:800; font-size:22px; color:var(--teal-d);}
  @keyframes newcardIn{0%{opacity:0; transform:translate(-50%,-50%) scale(.4) rotate(-6deg)}12%{opacity:1; transform:translate(-50%,-50%) scale(1.1) rotate(2deg)}22%{transform:translate(-50%,-50%) scale(1) rotate(0)}82%{opacity:1; transform:translate(-50%,-50%) scale(1)}100%{opacity:0; transform:translate(-50%,-62%) scale(.9)}}

  /* ---------- Khối đặc biệt ---------- */
  .pcell.sp{display:flex; align-items:center; justify-content:center; line-height:1;
    font-size:calc(var(--pc,17px) * .78); animation:spPulse .9s ease-in-out infinite alternate;}
  #floater .pcell.sp{font-size:calc(var(--fc,34px) * .78);}
  .pcell.sp-bomb{background:linear-gradient(135deg,#7C8FA0,#2C3E50);}
  .pcell.sp-rainbow{background:linear-gradient(135deg,#FF6B6B,#FFC53D,#5FC97B,#4D96FF,#9B72CF);}
  @keyframes spPulse{0%{filter:brightness(1)}100%{filter:brightness(1.35) drop-shadow(0 0 6px var(--gold))}}
  .cell.sp-cell{display:flex; align-items:center; justify-content:center; font-size:70%;}

  /* ---------- Preview hàng sắp nổ ---------- */
  .cell.ghost-line{background:rgba(240,165,0,.55)!important; outline:2px solid var(--gold); outline-offset:-2px;
    animation:linePulse .6s ease-in-out infinite alternate;}
  @keyframes linePulse{0%{filter:brightness(1)}100%{filter:brightness(1.4)}}

  /* ---------- Pháo hoa ---------- */
  .fw{position:fixed; left:0; top:0; font-size:24px; pointer-events:none; z-index:88; will-change:transform,opacity;
    animation:fly var(--dur,1s) cubic-bezier(.15,.7,.3,1) forwards;}

  /* ---------- Thanh chuỗi combo ---------- */
  .streakbar{display:flex; justify-content:center; min-height:0; margin-top:-4px;}
  .streak-chip{background:linear-gradient(135deg,#FF9445,#FF6B6B); color:#fff;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:15px; padding:5px 16px; border-radius:99px;
    box-shadow:0 4px 0 rgba(0,0,0,.15); animation:chipIn .35s cubic-bezier(.2,1.3,.4,1);}
  @keyframes chipIn{0%{transform:scale(.5); opacity:0}100%{transform:scale(1); opacity:1}}

  /* celebration toast */
  #cheer{position:fixed; left:50%; top:34%; transform:translate(-50%,-50%) scale(.5); opacity:0; z-index:90; pointer-events:none; text-align:center;}
  #cheer.show{animation:cheer 1.4s ease forwards;}
  #cheer .ce{font-size:78px; line-height:1;}
  #cheer .cw{font-family:'Baloo 2',cursive; font-weight:800; font-size:34px; color:var(--gold); text-shadow:0 3px 0 rgba(0,0,0,.15);}
  @keyframes cheer{0%{opacity:0; transform:translate(-50%,-50%) scale(.4)}20%{opacity:1; transform:translate(-50%,-50%) scale(1.1)}75%{opacity:1; transform:translate(-50%,-60%) scale(1)}100%{opacity:0; transform:translate(-50%,-80%) scale(1)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">Word<b>Blast</b></div>
    <div class="stats">
      <div class="stat"><div class="k">Điểm</div><div class="v" id="score">0</div></div>
      <div class="stat"><div class="k">Kỷ lục</div><div class="v" id="best">0</div></div>
    </div>
    <button class="iconbtn" id="collbtn" title="Bộ sưu tập thẻ">📚</button>
    <button class="iconbtn" id="mute" title="Bật/tắt âm">🔊</button>
  </div>

  <div class="word">
    <div class="emoji" id="w-emoji">🍎</div>
    <div class="mid">
      <div class="theme" id="theme">Chủ đề</div>
      <div class="slots" id="slots"></div>
      <div class="meaning" id="meaning">Xóa hàng để ghép chữ nhé!</div>
    </div>
    <button class="speak" id="speak">🔊 Nghe</button>
  </div>

  <div class="streakbar" id="streakbar"></div>

  <div class="board-wrap"><div class="board-outer"><div id="board"></div></div></div>

  <div id="tray"></div>
  <div class="hint">Kéo khối thả vào bảng · 💣 nổ vùng 3×3 · 🌈 xóa cả hàng và cột</div>
</div>

<div id="floater"></div>

<div id="cheer"><div class="ce">🎉</div><div class="cw"></div></div>

<!-- Chọn cấp độ -->
<div class="overlay" id="levelscreen">
  <div class="card">
    <div class="big">🧩</div>
    <h2>Word Blast</h2>
    <p>Vừa xếp khối vừa học tiếng Anh</p>
    <div class="levels">

      o.type=type||'sine'; o.frequency.value=freq;
      o.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(.18,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
      o.start(); o.stop(AC.currentTime+dur);
    }catch(e){}
  }

      u.lang='en-US'; u.rate=rate||.85; u.pitch=1.05;

      if(en) u.voice=en;
      speechSynthesis.resume(); // chống lỗi Chrome bị treo loa
      speechSynthesis.speak(u);
    }catch(e){}
  }
  function speak(text,rate){ // hủy hàng đợi rồi đọc (dùng cho cả từ)

      speechSynthesis.cancel();

    else { m.textContent='Xóa hàng để ghép chữ nhé!'; m.classList.remove('show'); }

      if(revealed>=wd.w.length || done>=n) return;
      revealed++; done++;
      const letter=wd.w[revealed-1];
      sLetterWin();
      renderWord();
      setTimeout(()=>speakNow(letter,.6), 150);
      if(revealed>=wd.w.length){ setTimeout(()=>completeWord(), 900); return; }
      setTimeout(step, 750);
    }
    step();
  }

  // ---- Bộ sưu tập thẻ từ vựng ----
  let cards={};
  try{ cards=JSON.parse(localStorage.getItem('wb_cards')||'{}')||{}; }catch(e){ cards={}; }
  function saveCards(){ try{localStorage.setItem('wb_cards',JSON.stringify(cards));}catch(e){} }

  function unlockCard(wd){
    const isNew = !cards[wd.w];
    cards[wd.w] = (cards[wd.w]||0)+1;
    saveCards();
    if(isNew){
      setTimeout(()=>{
        const pop=document.createElement('div');
        pop.className='newcard-pop';
        pop.innerHTML=`<div class="ne">${wd.e}</div><div class="nt">✨ THẺ MỚI! ✨</div><div class="nw">${wd.w}</div>`;
        document.body.appendChild(pop);
        setTimeout(()=>pop.remove(), 2050);
      }, 1500);
    }
    return isNew;
  }

    const themes=[...new Set(WORDS.map(x=>x.t))];

  function completeWord(){

  function rewardBlast(){
    const filled=[];
    for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(board[r][c]) filled.push([r,c]);
    for(let i=filled.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[filled[i],filled[j]]=[filled[j],filled[i]];}

  // ---- Khay khối ----
  const SP_EMOJI={bomb:'💣', rainbow:'🌈'};
  function makePiece(){
    // ~9% cơ hội ra khối đặc biệt (1 ô, luôn đặt được)
    const roll=Math.random();
    if(roll<0.055) return {shape:[[0,0]], color:'--sun', special:'bomb', used:false};
    if(roll<0.09)  return {shape:[[0,0]], color:'--grape', special:'rainbow', used:false};
    const shape=POOL[(Math.random()*POOL.length)|0];
    const color=COLORS[(Math.random()*COLORS.length)|0];
    return {shape, color, used:false};
  }
  function refillTray(){ tray=[makePiece(),makePiece(),makePiece()]; renderTray(); checkGameOver(); }

  function shapeBounds(shape){
    let mr=0,mc=0; shape.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
    return {rows:mr+1, cols:mc+1};
  }

  function renderTray(){
    trayEl.innerHTML='';
    tray.forEach((p,i)=>{
      const {rows,cols}=shapeBounds(p.shape);
      const wrap=document.createElement('div');
      wrap.className='piece'+(p.used?' used':'');
      wrap.style.gridTemplateColumns=`repeat(${cols},var(--pc,17px))`;
      const set=new Set(p.shape.map(([r,c])=>r+','+c));
      for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
        const d=document.createElement('div');
        if(set.has(r+','+c)){
          d.className='pcell';
          if(p.special){ d.classList.add('sp','sp-'+p.special); d.textContent=SP_EMOJI[p.special]; }
          else d.style.background=`var(${p.color})`;
        }
        else d.className='pcell empty';
        wrap.appendChild(d);
      }
      wrap.dataset.i=i;
      if(!p.used) attachDrag(wrap,i);
      trayEl.appendChild(wrap);
    });
  }

  // ---- Đặt khối ----
  function canPlace(shape,ar,ac){
    for(const [r,c] of shape){
      const R=ar+r, C=ac+c;
      if(R<0||R>=N||C<0||C>=N) return false;
      if(board[R][C]) return false;
    }
    return true;
  }
  function place(p,ar,ac){ p.shape.forEach(([r,c])=>{ board[ar+r][ac+c]=p.color; }); }

  // ---- Hiệu ứng hạt nổ ----
  function spawnParticles(cellEl,colorVar){
    const rect=cellEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const col=getComputedStyle(document.documentElement).getPropertyValue(colorVar.replace('var(','').replace(')','')).trim() || '#FFC53D';
    const n=6;
    for(let i=0;i<n;i++){
      const p=document.createElement('div');
      p.className='particle spark';
      const size=4+Math.random()*5;
      p.style.width=size+'px'; p.style.height=size+'px';
      p.style.background=col;
      const ang=(Math.PI*2*i/n)+Math.random()*.6;
      const dist=32+Math.random()*38;
      const x1=Math.cos(ang)*dist, y1=Math.sin(ang)*dist-8;
      p.style.setProperty('--x0', cx+'px'); p.style.setProperty('--y0', cy+'px');
      p.style.setProperty('--x1', (cx+x1)+'px'); p.style.setProperty('--y1', (cy+y1)+'px');
      p.style.setProperty('--dur', (.7+Math.random()*.35)+'s');
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 1150);
    }
  }

  // ---- Khối đặc biệt: kích hoạt khi thả ----
  function triggerSpecial(p,sr,sc){
    const toClear=new Set();
    if(p.special==='bomb'){
      for(let r=sr-1;r<=sr+1;r++) for(let c=sc-1;c<=sc+1;c++)
        if(r>=0&&r<N&&c>=0&&c<N&&board[r][c]) toClear.add(idx(r,c));
    } else { // cầu vồng: xóa cả hàng lẫn cột
      for(let c=0;c<N;c++) if(board[sr][c]) toClear.add(idx(sr,c));
      for(let r=0;r<N;r++) if(board[r][sc]) toClear.add(idx(r,sc));
    }
    renderBoard();
    toClear.forEach(i=>{
      cells[i].classList.add('clearing');
      spawnParticles(cells[i], board[(i/N)|0][i%N]);
    });
    if(p.special==='bomb'){
      beep(90,.5,'sawtooth'); setTimeout(()=>beep(60,.5,'sawtooth'),120);
      boardEl.classList.remove('mega-shake'); void boardEl.offsetWidth; boardEl.classList.add('mega-shake');
    } else {

    setTimeout(()=>{
      toClear.forEach(i=>{ board[(i/N)|0][i%N]=null; });
      applyGravityAnimated(()=>{ afterPlace(); });

  // ---- Trọng lực: khối rơi xuống lấp chỗ trống sau khi nổ ----
  function applyGravityAnimated(cb){
    const {rect,pad,gap,size}=cellMetrics();
    const step=size+gap;
    const moves=[]; // {c, fromRow, toRow, color}
    for(let c=0;c<N;c++){
      const vals=[];
      for(let r=0;r<N;r++) if(board[r][c]) vals.push({r, color:board[r][c]});
      // xếp dồn xuống đáy, giữ nguyên thứ tự tương đối
      const newRows=[];
      for(let i=0;i<vals.length;i++) newRows.push(N-vals.length+i);
      for(let i=0;i<vals.length;i++){
        const from=vals[i].r, to=newRows[i];
        if(from!==to) moves.push({c, from, to, color:vals[i].color});
      }
      // cập nhật board cho cột này
      for(let r=0;r<N;r++) board[r][c]=null;
      for(let i=0;i<vals.length;i++) board[newRows[i]][c]=vals[i].color;
    }
    if(moves.length===0){ renderBoard(); if(cb) cb(); return; }
    // vẽ trạng thái hiện có (đã xóa toClear), rồi animate các ô rơi
    renderBoard();
    moves.forEach(m=>{
      const el=cells[idx(m.to,m.c)];
      const dy=(m.from-m.to)*step;
      el.style.transition='none';
      el.style.transform=`translateY(${-dy}px)`;
      // ép reflow rồi trả về vị trí thật
      void el.offsetWidth;
      el.style.transition='transform .28s cubic-bezier(.3,.6,.3,1)';
      el.style.transform='translateY(0)';
    });
    setTimeout(()=>{
      moves.forEach(m=>{
        const el=cells[idx(m.to,m.c)];
        el.style.transition=''; el.style.transform='';
      });
      if(cb) cb();
    }, 300);
  }

  function clearLines(onDone){
    let total=0;
    function pass(){
      const fullR=[], fullC=[];
      for(let r=0;r<N;r++) if(board[r].every(v=>v)) fullR.push(r);
      for(let c=0;c<N;c++){ let ok=true; for(let r=0;r<N;r++) if(!board[r][c]){ok=false;break;} if(ok) fullC.push(c); }
      const lines=fullR.length+fullC.length;
      if(lines===0){ if(onDone) onDone(total); return; }
      total+=lines;
      const toClear=new Set();
      fullR.forEach(r=>{ for(let c=0;c<N;c++) toClear.add(idx(r,c)); });
      fullC.forEach(c=>{ for(let r=0;r<N;r++) toClear.add(idx(r,c)); });
      toClear.forEach(i=>{
        cells[i].classList.add('clearing');
        spawnParticles(cells[i], board[(i/N)|0][i%N]);
      });
      sClear(lines);
      showCombo(lines);
      let pts=toClear.size*10 + (lines-1)*30;
      bumpScore(pts);
      setTimeout(()=>{
        toClear.forEach(i=>{ board[(i/N)|0][i%N]=null; });
        applyGravityAnimated(()=>{ pass(); }); // kiểm tra lại sau khi rơi (cascade)
      }, 480);
    }
    pass();
  }

  function afterPlace(){
    renderBoard();
    clearLines((totalLines)=>{
      if(totalLines>0) streak++; else streak=0;
      renderStreak();
      if(totalLines>=2) spawnFireworks(totalLines>=3?3:2);
      if(streak>=2 && totalLines>0) showStreakPop();
      if(totalLines>=3 || streak>=3){
        setTimeout(()=>megaStrike(), 200);
        streak=0; renderStreak();
      }
      if(totalLines>0) earnLetters(totalLines);
      bumpScore(1);
      if(tray.every(p=>p.used)) refillTray();
      else checkGameOver();
    });
  }

  function showStreakPop(){
    const rect=boardEl.getBoundingClientRect();
    const label=document.createElement('div');
    label.className='combo-pop';
    label.textContent='🔥 CHUỖI x'+streak+'!';

    label.style.top=(rect.top+rect.height*0.15)+'px';
    label.style.fontSize='24px';

    setTimeout(()=>label.remove(), 850);

  function anyMove(){
    for(const p of tray){ if(p.used) continue;
      for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(canPlace(p.shape,r,c)) return true;
    }
    return false;
  }
  function checkGameOver(){ if(tray.some(p=>!p.used) && !anyMove()) endGame(); }
  function endGame(){
    document.getElementById('final').textContent='Điểm: '+score;
    document.getElementById('wordsdone').textContent='Đã học '+wordsDone+' từ tiếng Anh';
    document.getElementById('gameover').classList.add('show');
    sLose();

  // ---- Kéo thả (pointer: chuột + cảm ứng) ----
  const floater=document.getElementById('floater');
  let drag=null;

  function attachDrag(el,i){
    el.addEventListener('pointerdown', e=>{
      if(tray[i].used) return;
      e.preventDefault();
      if(!AC){ try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){} }
      startDrag(i,e,el);
    });
  }
  function startDrag(i,e,el){
    const p=tray[i];
    drag={i, p, anchor:null};
    el.classList.add('dragging');
    const {rows,cols}=shapeBounds(p.shape);
    floater.innerHTML='';
    floater.style.gridTemplateColumns=`repeat(${cols},var(--fc))`;
    const set=new Set(p.shape.map(([r,c])=>r+','+c));
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      const d=document.createElement('div');
      if(set.has(r+','+c)){
        d.className='pcell';
        if(p.special){ d.classList.add('sp','sp-'+p.special); d.textContent=SP_EMOJI[p.special]; }
        else d.style.background=`var(${p.color})`;
      }
      else d.className='pcell empty';
      floater.appendChild(d);
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp, {once:true});
    onMove(e);
  }

  function cellMetrics(){
    const rect=boardEl.getBoundingClientRect();
    const pad=9, gap=5;
    const inner=rect.width-pad*2;
    const size=(inner-gap*(N-1))/N;
    return {rect,pad,gap,size};
  }

  function onMove(e){
    if(!drag) return;
    const {rect,pad,gap,size}=cellMetrics();
    const {rows,cols}=shapeBounds(drag.p.shape);
    const fc=size; floater.style.setProperty('--fc', fc+'px');
    const fw=cols*fc+(cols-1)*4, fh=rows*fc+(rows-1)*4;
    floater.style.transform=`translate(${e.clientX-fw/2}px, ${e.clientY-fh-28}px)`;
    const px=e.clientX, py=e.clientY-fh/2-28;
    const col=Math.round((px-rect.left-pad-size/2)/(size+gap)) - Math.floor((cols-1)/2);
    const row=Math.round((py-rect.top -pad-size/2)/(size+gap)) - Math.floor((rows-1)/2);
    drag.anchor=[row,col];
    paintGhost(row,col);
  }

  function clearGhost(){ cells.forEach(c=>c.classList.remove('ghost-ok','ghost-bad','ghost-line')); }
  function paintGhost(ar,ac){
    clearGhost();
    const ok=canPlace(drag.p.shape,ar,ac);
    drag.p.shape.forEach(([r,c])=>{
      const R=ar+r,C=ac+c;
      if(R>=0&&R<N&&C>=0&&C<N) cells[idx(R,C)].classList.add(ok?'ghost-ok':'ghost-bad');
    });
    // Xem trước: hàng/cột nào sẽ nổ nếu thả ở đây
    if(ok && !drag.p.special){
      const sim=board.map(row=>row.slice());
      drag.p.shape.forEach(([r,c])=>{ sim[ar+r][ac+c]='x'; });
      for(let r=0;r<N;r++) if(sim[r].every(v=>v)) for(let c=0;c<N;c++) cells[idx(r,c)].classList.add('ghost-line');
      for(let c=0;c<N;c++){ let f=true; for(let r=0;r<N;r++) if(!sim[r][c]){f=false;break;}
        if(f) for(let r=0;r<N;r++) cells[idx(r,c)].classList.add('ghost-line'); }
    }
    // Xem trước vùng nổ của khối đặc biệt
    if(ok && drag.p.special){
      const sr=ar, sc=ac;
      if(drag.p.special==='bomb'){
        for(let r=sr-1;r<=sr+1;r++) for(let c=sc-1;c<=sc+1;c++)
          if(r>=0&&r<N&&c>=0&&c<N) cells[idx(r,c)].classList.add('ghost-line');
      } else {
        for(let c=0;c<N;c++) cells[idx(sr,c)].classList.add('ghost-line');
        for(let r=0;r<N;r++) cells[idx(r,sc)].classList.add('ghost-line');
      }
    }
    drag.ok=ok;
  }

  function onUp(){
    window.removeEventListener('pointermove', onMove);
    const d=drag; drag=null;
    floater.style.transform='translate(-9999px,-9999px)';
    document.querySelectorAll('.piece.dragging').forEach(el=>el.classList.remove('dragging'));
    clearGhost();
    if(!d||!d.anchor) return;
    const [ar,ac]=d.anchor;
    if(canPlace(d.p.shape,ar,ac)){
      place(d.p,ar,ac); d.p.used=true;
      renderTray(); sPlace();
      if(d.p.special) triggerSpecial(d.p, ar, ac);
      else afterPlace();
    }
  }

  // ---- Nút ----
  document.getElementById('speak').addEventListener('click',()=>speak(curWord().w));
  document.getElementById('again').addEventListener('click',()=>startGame(level));
  document.getElementById('changelvl').addEventListener('click',()=>{
    document.getElementById('gameover').classList.remove('show');
    document.getElementById('levelscreen').classList.add('show');
  });
  document.querySelectorAll('.lvl').forEach(b=>{
    b.addEventListener('click',()=>{
      if(!AC){ try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){} }
      startGame(b.dataset.lvl);
    });
  });
  document.getElementById('collbtn').addEventListener('click',()=>{
    renderCollection();
    document.getElementById('collection').classList.add('show');
  });
  document.getElementById('collclose').addEventListener('click',()=>{
    document.getElementById('collection').classList.remove('show');
  });
  document.getElementById('mute').addEventListener('click', e=>{
    muted=!muted; e.currentTarget.textContent = muted?'🔇':'🔊';
  });

  function sizeTray(){
    const w=Math.min(window.innerWidth,560);
    const pc=Math.max(14, Math.min(20, Math.floor(w/26)));
    document.documentElement.style.setProperty('--pc', pc+'px');
  }
  window.addEventListener('resize', sizeTray);

  buildBoard(); sizeTray(); renderScore();
  document.getElementById('levelscreen').classList.add('show');
})();
</script>
</body>
</html>
